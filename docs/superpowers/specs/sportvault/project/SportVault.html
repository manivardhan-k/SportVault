// ─── LINE CHART ───────────────────────────────────────────────────────────────
function LineChart({ data, color = '#dc2626', label = 'PTS' }) {
  const W = 560,H = 160,pad = { t: 16, r: 16, b: 32, l: 42 };
  const iW = W - pad.l - pad.r,iH = H - pad.t - pad.b;
  const max = Math.max(...data);
  const pts = data.map((v, i) => ({
    x: pad.l + i / (data.length - 1) * iW,
    y: pad.t + (1 - v / max) * iH
  }));
  const path = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const fill = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ') +
  ` L${pts[pts.length - 1].x},${pad.t + iH} L${pts[0].x},${pad.t + iH} Z`;
  const yTicks = [0, 0.25, 0.5, 0.75, 1].map((f) => ({ v: Math.round(max * f), y: pad.t + (1 - f) * iH }));
  const xStep = Math.ceil(data.length / 6);
  return (
    <svg width={W} height={H} style={{ overflow: 'visible', width: "1000px" }}>
      <defs>
        <linearGradient id={`lg-${color.replace('#', '')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.12" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      {yTicks.map((t) =>
      <g key={t.v}>
          <line x1={pad.l} x2={pad.l + iW} y1={t.y} y2={t.y} stroke="#e4e3df" strokeWidth="1" />
          <text x={pad.l - 6} y={t.y + 4} textAnchor="end" fontSize="10" fill="#9a9894" fontFamily="DM Mono">{t.v}</text>
        </g>
      )}
      {data.map((_, i) => i % xStep === 0 &&
      <text key={i} x={pad.l + i / (data.length - 1) * iW} y={pad.t + iH + 18} textAnchor="middle" fontSize="10" fill="#9a9894" fontFamily="DM Mono">{i + 1}</text>
      )}
      <path d={fill} fill={`url(#lg-${color.replace('#', '')})`} />
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      {pts.map((p, i) => i === pts.length - 1 &&
      <circle key={i} cx={p.x} cy={p.y} r={4} fill={color} />
      )}
      <text x={pad.l + iW} y={pad.t - 4} textAnchor="end" fontSize="10" fill={color} fontFamily="DM Mono" fontWeight="500">{label} {data[data.length - 1]}</text>
    </svg>);

}

// ─── RADAR CHART ──────────────────────────────────────────────────────────────
function RadarChart({ detail }) {
  const cx = 130,cy = 120,r = 80;
  const cats = [
  { label: 'PPG', val: detail.ppg / 35 },
  { label: 'RPG', val: detail.rpg / 15 },
  { label: 'APG', val: detail.apg / 12 },
  { label: 'FG%', val: detail.fg },
  { label: '3P%', val: detail.tp / 0.5 }];

  const n = cats.length;
  const angle = (i) => Math.PI * 2 / n * i - Math.PI / 2;
  const pt = (i, frac) => ({
    x: cx + Math.cos(angle(i)) * r * frac,
    y: cy + Math.sin(angle(i)) * r * frac
  });
  const gridLevels = [0.25, 0.5, 0.75, 1];
  const dataPath = cats.map((c, i) => {
    const p = pt(i, c.val);
    return `${i === 0 ? 'M' : 'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`;
  }).join(' ') + 'Z';
  return (
    <svg width={260} height={240} style={{ overflow: 'visible' }}>
      {gridLevels.map((f) =>
      <polygon key={f} points={cats.map((_, i) => {const p = pt(i, f);return `${p.x},${p.y}`;}).join(' ')}
      fill="none" stroke="#e4e3df" strokeWidth="1" />
      )}
      {cats.map((_, i) => {
        const p = pt(i, 1);
        return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#e4e3df" strokeWidth="1" />;
      })}
      <path d={dataPath} fill="rgba(220,38,38,0.1)" stroke="#dc2626" strokeWidth="2" />
      {cats.map((c, i) => {
        const p = pt(i, c.val);
        return <circle key={i} cx={p.x} cy={p.y} r={3} fill="#dc2626" />;
      })}
      {cats.map((c, i) => {
        const lp = pt(i, 1.22);
        return <text key={i} x={lp.x} y={lp.y} textAnchor="middle" dominantBaseline="middle"
        fontSize="10" fill="#5a5955" fontFamily="DM Mono" fontWeight="500">{c.label}</text>;
      })}
    </svg>);

}

  else if (isNBA) statChips = [['PPG', d.ppg], ['RPG', d.rpg], ['APG', d.apg], ['FG%', d.fg], ['3P%', d.tp], ['G', d.g]];
  else if (isSoccer) statChips = [['Goals', d.goals], ['Assists', d.assists], ['xG', d.xg], ['Shots', d.shots], ['Mins', d.mins]];
  else if (isNFL) statChips = [['Yds', d.yds], ['TDs', d.tds], ['INTs', d.ints], ['Rtg', d.rtg], ['Rush', d.rush], ['G', d.g]];

  const chartLabel = isF1 ? 'PTS' : isSoccer ? 'Goals' : isNFL ? 'Yds' : '';
  const chartTitle = isF1 ? 'CUMULATIVE POINTS BY ROUND' : isSoccer ? 'GOALS BY MATCHWEEK' : isNFL ? 'PASSING YARDS BY WEEK' : '';

  return (
    <div style={{ background: '#faf9f7', borderTop: '1px solid var(--border)', padding: '14px 24px 18px', display: 'flex', gap: 32, alignItems: 'flex-start' }}>
      {/* Left: stat chips */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6, flexShrink: 0 }}>
        <div style={{ fontSize: 9, color: 'var(--text3)', letterSpacing: '0.08em', fontFamily: 'DM Mono', marginBottom: 2 }}>SEASON STATS</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, auto)', gap: 6 }}>
          {statChips.map(([l, v]) =>
            <div key={l} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 5, padding: '5px 10px', minWidth: 52 }}>
              <div style={{ fontSize: 9, color: 'var(--text3)', letterSpacing: '0.06em', marginBottom: 2, fontFamily: 'DM Mono' }}>{l.toUpperCase()}</div>
              <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--text)', fontFamily: 'DM Mono' }}>{v}</div>
            </div>
          )}
        </div>
      </div>
      {/* Right: chart */}
      <div style={{ flex: 1, minWidth: 0 }}>
        {row.chart === 'line' && <>
          <div style={{ fontSize: 9, color: 'var(--text3)', letterSpacing: '0.08em', marginBottom: 6, fontFamily: 'DM Mono' }}>{chartTitle}</div>
          <LineChart data={row.lineData} label={chartLabel} />
        </>}
        {row.chart === 'radar' && <>
          <div style={{ fontSize: 9, color: 'var(--text3)', letterSpacing: '0.08em', marginBottom: 4, fontFamily: 'DM Mono' }}>STAT PROFILE — {row.name.toUpperCase()}</div>
          <RadarChart detail={d} />
        </>}
      </div>
    </div>);
}

// ─── TOP PERFORMER ROW ───────────────────────────────────────────────────────
function TopPerformerRow({ sd, yearIdx, tabIdx, acc, sport }) {
  const [expanded, setExpanded] = useState(false);
  const [hovered, setHovered] = useState(false);
  const expandRef = useRef(null);
  const [expandH, setExpandH] = useState(0);

  useEffect(() => { setExpanded(false); }, [sport, tabIdx, yearIdx]);
  useEffect(() => { if (expandRef.current) setExpandH(expandRef.current.scrollHeight); }, [expanded, sport]);

  const topRow = { name: sd.top.name, detail: sd.top.detail, chart: sd.top.chart, lineData: sd.top.lineData };

  return (
    <div style={{ background: 'var(--surface)', borderBottom: expanded ? 'none' : `2px solid ${acc}`,
      position: 'sticky', top: 0, zIndex: 8, flexShrink: 0 }}>
      <div onClick={() => setExpanded(e => !e)}
        onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
        style={{ padding: '0 24px', cursor: 'pointer', background:
          hovered ? '#faf9f7' : 'linear-gradient(135deg,#fff 0%,#fefdfb 100%)',
          transition: 'background 0.15s', borderBottom: expanded ? `2px solid ${acc}` : 'none' }}>
        <div style={{ display: 'flex', alignItems: 'center', height: 52, gap: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <div style={{ fontSize: 10, fontFamily: 'DM Mono', color: 'var(--text3)', letterSpacing: '0.06em' }}>P1</div>
            <div style={{ width: 6, height: 6, borderRadius: '50%', background: acc }} />
          </div>
          <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--text)' }}>{sd.top.name}</div>
          <div style={{ fontSize: 12, color: 'var(--text3)', paddingLeft: 4 }}>{sd.top.sub}</div>
          <div style={{ width: 1, height: 20, background: 'var(--border)', margin: '0 8px' }} />
          {sd.top.stats.map((s) =>
            <div key={s.l} style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
              <span style={{ fontFamily: 'DM Mono', fontSize: 16, fontWeight: 600, color: 'var(--text)' }}>{s.v}</span>
              <span style={{ fontSize: 10, color: 'var(--text3)', fontFamily: 'DM Mono' }}>{s.l}</span>
            </div>
          )}
          <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{ fontSize: 10, fontFamily: 'DM Mono', color: acc, letterSpacing: '0.06em', fontWeight: 600 }}>
              {sd.years[yearIdx]} · {sd.tabs[tabIdx].toUpperCase()}
            </span>
            <span style={{ fontSize: 11, color: 'var(--text3)', transition: 'transform 0.25s', display: 'inline-block',
              transform: expanded ? 'rotate(180deg)' : 'rotate(0deg)' }}>▾</span>
          </div>
        </div>
      </div>
      <div ref={expandRef} style={{ maxHeight: expanded ? 600 : 0, overflow: 'hidden',
        transition: 'max-height 0.38s cubic-bezier(0.4,0,0.2,1)', borderBottom: expanded ? `2px solid ${acc}` : 'none' }}>
        <ExpandedRow row={topRow} sport={sport} />
      </div>
    </div>);
}

// ─── TABLE ROW ────────────────────────────────────────────────────────────────
function TableRow({ row, sport, colWidths, isExpanded, onToggle, accentColor }) {
  const [hovered, setHovered] = useState(false);
  const expandRef = useRef(null);
  const [expandH, setExpandH] = useState(0);

  useEffect(() => {
    if (expandRef.current) setExpandH(expandRef.current.scrollHeight);
  }, [isExpanded]);

  const gridStyle = { display: 'grid', gridTemplateColumns: colWidths, alignItems: 'center' };

  return (
    <div style={{ borderBottom: '1px solid var(--border)', background: hovered && !isExpanded ? '#faf9f7' : 'var(--surface)', transition: 'background 0.15s' }}
    onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}>
      <div style={{ ...gridStyle, padding: '0 12px', height: 56, cursor: 'pointer', userSelect: 'none' }} onClick={onToggle}>
        <div style={{ fontFamily: 'DM Mono', fontSize: 13, color: 'var(--text3)', textAlign: 'center' }}>{row.rank}</div>
        <div style={{ paddingLeft: 8 }}>
          <div style={{ fontSize: 14, fontWeight: 500, color: 'var(--text)', transition: 'color 0.15s', ...(hovered && { color: accentColor }) }}>{row.name}</div>
          <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 1 }}>{row.sub}</div>
        </div>
        {row.cols.map((c, i) =>
        <div key={i} style={{ textAlign: 'center', fontFamily: 'DM Mono', fontSize: 13, color: i === 0 ? 'var(--text2)' : 'var(--text)', fontWeight: i > 0 ? 500 : 400 }}>{c}</div>
        )}
      </div>
      <div ref={expandRef} style={{ maxHeight: isExpanded ? expandH + 4 : 0, overflow: 'hidden', transition: 'max-height 0.38s cubic-bezier(0.4,0,0.2,1)' }}>
        <ExpandedRow row={row} sport={sport} />
      </div>
    </div>);

}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accentColor": "#cc0f0f",
    "compactMode": false,
    "showChart": true
  }/*EDITMODE-END*/;
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  const [sport, setSport] = useState('f1');
  const [tabIdx, setTabIdx] = useState(0);
  const [yearIdx, setYearIdx] = useState(0);
  const [expandedRow, setExpandedRow] = useState(null);
  const [pillStyle, setPillStyle] = useState({ left: 0, width: 0 });
  const [tabPillStyle, setTabPillStyle] = useState({ left: 0, width: 0 });
  const sportBtnRefs = useRef({});
  const tabBtnRefs = useRef([]);

  const sd = DATA[sport];
  const acc = tweaks.accentColor;

  // Sport pill
  useEffect(() => {
    const el = sportBtnRefs.current[sport];
    if (el) setPillStyle({ left: el.offsetLeft, width: el.offsetWidth });
  }, [sport]);

  // Tab pill
  useEffect(() => {
    const el = tabBtnRefs.current[tabIdx];
    if (el) setTabPillStyle({ left: el.offsetLeft, width: el.offsetWidth });
    setExpandedRow(null);
  }, [tabIdx, sport]);

  useEffect(() => {setTabIdx(0);setYearIdx(0);setExpandedRow(null);}, [sport]);

  // Tweaks messaging
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  const colWidths = sd.colWidths.join(' ');
  const gridStyle = { display: 'grid', gridTemplateColumns: colWidths, alignItems: 'center' };

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', background: 'var(--bg)', fontFamily: 'DM Sans, sans-serif' }}>
      {/* HEADER */}
      <div style={{ background: 'var(--surface)', borderBottom: '1px solid var(--border)', padding: '0 24px', flexShrink: 0, position: 'relative', zIndex: 10 }}>
        <div style={{ display: 'flex', alignItems: 'center', height: 52, justifyContent: 'space-between' }}>
          {/* Logo */}
          <span style={{ fontSize: 14, fontWeight: 600, letterSpacing: '0.12em', color: 'var(--text)', fontFamily: 'DM Mono' }}>SPORTVAULT</span>

          {/* Sport Selector */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 0, position: 'relative', background: 'var(--surface2)', borderRadius: 8, padding: '3px', border: '1px solid var(--border)' }}>
            {/* Sliding pill */}
            <div style={{ position: 'absolute', top: 3, left: 3 + pillStyle.left, width: pillStyle.width, height: 'calc(100% - 6px)',
              background: 'var(--surface)', border: `1px solid ${acc}22`, borderRadius: 6,
              boxShadow: '0 1px 4px rgba(0,0,0,0.08)', transition: 'left 0.28s cubic-bezier(0.4,0,0.2,1), width 0.28s cubic-bezier(0.4,0,0.2,1)', pointerEvents: 'none' }} />
            {SPORT_ORDER.map((s) => {
              const active = s === sport;
              return (
                <button key={s} ref={(el) => sportBtnRefs.current[s] = el}
                onClick={() => setSport(s)}
                style={{ position: 'relative', zIndex: 1, background: 'transparent', border: 'none', cursor: 'pointer',
                  padding: '5px 14px', borderRadius: 6, fontSize: 12, fontWeight: 500,
                  color: active ? acc : 'var(--text2)',
                  transition: 'color 0.2s', whiteSpace: 'nowrap',
                  display: 'flex', alignItems: 'center', gap: 5 }}>
                  <span style={{ fontSize: 10 }}>{DATA[s].icon}</span>
                  {DATA[s].label}
                </button>);

            })}
          </div>
        </div>

        {/* Tabs row */}
        <div style={{ display: 'flex', alignItems: 'center', height: 36, gap: 0, position: 'relative' }}>
          <div style={{ display: 'flex', position: 'relative', gap: 0 }}>
            {/* Tab underline pill */}
            <div style={{ position: 'absolute', bottom: 0, left: tabPillStyle.left, width: tabPillStyle.width, height: 2,
              background: acc, borderRadius: 1, transition: 'left 0.25s cubic-bezier(0.4,0,0.2,1), width 0.25s cubic-bezier(0.4,0,0.2,1)' }} />
            {sd.tabs.map((t, i) =>
            <button key={t} ref={(el) => tabBtnRefs.current[i] = el}
            onClick={() => setTabIdx(i)}
            style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: '0 16px 0 0', height: 36,
              fontSize: 13, fontWeight: tabIdx === i ? 500 : 400, color: tabIdx === i ? 'var(--text)' : 'var(--text3)',
              transition: 'color 0.2s', position: 'relative' }}>
                {t}
              </button>
            )}
          </div>

          {/* Year selector */}
          <div style={{ marginLeft: 'auto', display: 'flex', gap: 0, alignItems: 'center' }}>
            {sd.years.map((y, i) =>
            <button key={y} onClick={() => {setYearIdx(i);setExpandedRow(null);}}
            style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: '0 8px', height: 36,
              fontSize: 12, fontFamily: 'DM Mono', fontWeight: yearIdx === i ? 600 : 400,
              color: yearIdx === i ? acc : 'var(--text3)', transition: 'color 0.2s' }}>
                {y}
              </button>
            )}
          </div>
        </div>
      </div>

      {/* SCROLL AREA */}
      <div style={{ flex: 1, overflowY: 'auto', display: 'flex', flexDirection: 'column' }}>
        {/* FROZEN TOP PERFORMER */}
        <TopPerformerRow sd={sd} yearIdx={yearIdx} tabIdx={tabIdx} acc={acc} sport={sport} />

        {/* TABLE */}
        <div style={{ flex: 1, background: 'var(--surface)' }}>
          {/* Table Header */}
          <div style={{ ...gridStyle, gridTemplateColumns: colWidths, padding: '0 12px', height: 38, borderBottom: '1px solid var(--border)', background: 'var(--surface2)', position: 'sticky', top: 52, zIndex: 7 }}>
            {sd.headers.map((h, i) =>
            <div key={h} style={{ textAlign: 'center', fontSize: 10, fontFamily: 'DM Mono', fontWeight: 500, color: 'var(--text3)', letterSpacing: '0.08em',
              ...(i === 1 && { textAlign: 'left', paddingLeft: 8 }), ...(i === 0 && { textAlign: 'center' }) }}>
                {h.toUpperCase()}
              </div>
            )}
          </div>

          {/* Rows */}
          {sd.rows.map((row) =>
          <TableRow key={row.id} row={row} sport={sport} colWidths={colWidths}
          isExpanded={expandedRow === row.id} accentColor={acc}
          onToggle={() => setExpandedRow(expandedRow === row.id ? null : row.id)} />
          )}
        </div>
      </div>

      {/* TWEAKS PANEL */}
      <div className={`tweaks-panel ${tweaksOpen ? 'open' : ''}`}>
        <div className="tweaks-title">Tweaks</div>
        <div className="tweak-row">
          <span className="tweak-label">Accent color</span>
          <input type="color" value={tweaks.accentColor} onChange={(e) => updateTweak('accentColor', e.target.value)}
          style={{ width: 28, height: 20, border: '1px solid var(--border)', borderRadius: 4, cursor: 'pointer', padding: 1 }} />
        </div>
        <div className="tweak-row">
          <span className="tweak-label">Compact rows</span>
          <button className={`tweak-toggle ${tweaks.compactMode ? 'on' : ''}`} onClick={() => updateTweak('compactMode', !tweaks.compactMode)} />
        </div>
        <div className="tweak-row">
          <span className="tweak-label">Show charts</span>
          <button className={`tweak-toggle ${tweaks.showChart ? 'on' : ''}`} onClick={() => updateTweak('showChart', !tweaks.showChart)} />
        </div>
      </div>

      <style>{`
        :root {
          --accent: ${acc};
        }
        button { outline: none; }
        button:focus-visible { outline: 2px solid ${acc}; outline-offset: 2px; }
      `}</style>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
